<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8EB1A7">
  <title>苏派盆景 AR 拼装小游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="phone-shell" aria-label="苏派盆景 AR 拼装小游戏">
    <div class="app-screen">
      <div class="status-bar" aria-hidden="true">
        <span>9:41</span>
        <span class="status-icons">
          <span></span>
          <span></span>
          <span></span>
          <i></i>
        </span>
      </div>

      <section id="homePage" class="page page-home is-active">
        <div class="home-card">
          <p class="eyebrow">江南园林 · 手机 WebAR</p>
          <h1>苏派盆景 AR 拼装小游戏</h1>
          <p>选择容器、枝干和叶片，创造你的江南小盆景</p>
        </div>

        <div class="home-illustration" aria-hidden="true">
          <div class="sun"></div>
          <div class="illustration-branch branch-left"></div>
          <div class="illustration-branch branch-right"></div>
          <div class="illustration-pot"></div>
        </div>

        <div class="intro-note">
          <strong>像 AR 一样摆放</strong>
          <span>进入后可在摄像头画面中拖动盆景整体，并用双指缩放。</span>
        </div>

        <button id="startExperienceButton" class="primary-button start-button" type="button">开始体验</button>
      </section>

      <section id="gamePage" class="page page-game" aria-label="AR 拼装页面">
        <header class="top-nav">
          <button id="backHomeButton" class="icon-button" type="button" aria-label="返回首页">‹</button>
          <div>
            <strong>AR 拼装</strong>
            <span>拖动或双指缩放盆景整体</span>
          </div>
          <button id="resetPoseButton" class="small-button" type="button">居中</button>
        </header>

        <nav class="stepper" aria-label="拼装步骤">
          <button class="step-pill is-active" data-step="1" type="button">
            <b>1</b>
            <span>选容器</span>
          </button>
          <button class="step-pill" data-step="2" type="button">
            <b>2</b>
            <span>选枝干</span>
          </button>
          <button class="step-pill" data-step="3" type="button">
            <b>3</b>
            <span>选叶片</span>
          </button>
        </nav>

        <section id="cameraPanel" class="camera-panel">
          <video id="cameraVideo" autoplay playsinline muted></video>
          <div id="cameraFallback" class="camera-fallback">
            <strong>请允许摄像头权限</strong>
            <span>如果暂时无法开启，也可以先在预览中完成拼装。</span>
          </div>

          <div id="bonsaiObject" class="bonsai-object" aria-label="可拖动缩放的盆景对象">
            <img id="plantLayer" class="ar-asset plant-layer" alt="植物图层">
            <img id="containerLayer" class="ar-asset container-layer" alt="容器图层">
          </div>

          <p id="cameraMessage" class="camera-message" role="status">请允许摄像头权限，才能体验 AR 盆景拼装。</p>
        </section>

        <section class="choice-panel">
          <div class="choice-header">
            <p id="stepInstruction">请选择一个容器</p>
            <span id="selectionSummary">容器：01</span>
          </div>

          <div id="choiceGrid" class="choice-grid" aria-label="当前步骤素材选项"></div>

          <div class="flow-actions">
            <button id="prevStepButton" class="secondary-button" type="button">上一步</button>
            <button id="nextStepButton" class="primary-button" type="button">下一步：选枝干</button>
            <button id="finishBonsaiButton" class="primary-button is-hidden" type="button">完成我的盆景</button>
          </div>
        </section>
      </section>

      <section id="resultPage" class="page page-result" aria-label="结果页面">
        <div class="result-card">
          <div class="medal">景</div>
          <h2>你的苏派盆景完成啦！</h2>
          <p>你完成了一盆属于自己的江南小盆景。</p>

          <div class="result-preview">
            <div class="result-object">
              <img id="resultPlantLayer" class="result-plant" alt="最终组合植物图">
              <img id="resultContainerLayer" class="result-container" alt="最终容器图">
            </div>
          </div>

          <ul id="resultChoices" class="result-choices"></ul>

          <div class="result-actions">
            <button id="backToKivicubeButton" class="primary-button" type="button">返回 Kivicube 场景</button>
            <button id="remixButton" class="primary-button" type="button">重新搭配</button>
            <button id="resultHomeButton" class="secondary-button" type="button">返回首页</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
